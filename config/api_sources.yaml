sources:
  - name: Gold London Fixing
    type: commodity
    symbol: GOLD
    api_provider: alpha_vantage
    endpoint_url: https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=GLD&apikey=${ALPHA_VANTAGE_KEY}
    response_path: Time Series (Daily)
    frequency_minutes: 15
  - name: Silver London Fixing
    type: commodity
    symbol: SILVER
