  - name: WTI Crude Oil
    type: commodity
    symbol: WTI
    api_provider: eia
    endpoint_url: https://api.eia.gov/v2/petroleum/pri/spt/data/?frequency=daily&data[0]=value&facets[series][]=RWTC&api_key=${EIA_API_KEY}
    response_path: response.data
    frequency_minutes: 15
  - name: Brent Crude Oil
